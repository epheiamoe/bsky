<template id="scene-02-vision-template">
  <div data-composition-id="scene-02-vision" data-width="1920" data-height="1080">
    <!-- Background layers -->
    <div class="s02-dot-grid"></div>
    <div class="s02-bg-radial"></div>
    <div class="s02-ghost-text">SOCIAL</div>

    <!-- Decorative elements -->
    <div class="s02-corner-frame"></div>
    <div class="s02-rule-top"></div>
    <div class="s02-rule-bottom"></div>
    <div class="s02-accent-bar"></div>

    <!-- Foreground content -->
    <div class="s02-content">
      <h1 class="s02-line1">Redefining</h1>
      <h1 class="s02-line2">Social Experience</h1>
      <h2 class="s02-line3">with Intelligence</h2>
    </div>

    <style>
      [data-composition-id="scene-02-vision"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #050505;
        overflow: hidden;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      /* Background dot grid pattern */
      .s02-dot-grid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(circle, rgba(100, 210, 255, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        z-index: 1;
        pointer-events: none;
      }

      /* Radial glow */
      .s02-bg-radial {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at 35% 55%, rgba(100, 210, 255, 0.06) 0%, transparent 60%);
        z-index: 2;
        pointer-events: none;
      }

      /* Ghost text "SOCIAL" */
      .s02-ghost-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 380px;
        font-weight: 700;
        letter-spacing: -0.04em;
        color: rgba(255, 255, 255, 0.03);
        white-space: nowrap;
        z-index: 2;
        pointer-events: none;
        user-select: none;
      }

      /* Corner frame accent */
      .s02-corner-frame {
        position: absolute;
        top: 60px;
        left: 60px;
        right: 60px;
        bottom: 60px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        z-index: 3;
        pointer-events: none;
      }

      /* Horizontal rules */
      .s02-rule-top {
        position: absolute;
        top: 380px;
        left: 160px;
        width: 200px;
        height: 1px;
        background: rgba(100, 210, 255, 0.25);
        z-index: 4;
        pointer-events: none;
      }

      .s02-rule-bottom {
        position: absolute;
        bottom: 340px;
        left: 160px;
        width: 120px;
        height: 1px;
        background: rgba(255, 255, 255, 0.12);
        z-index: 4;
        pointer-events: none;
      }

      /* Accent bar */
      .s02-accent-bar {
        position: absolute;
        top: 120px;
        left: 0;
        width: 4px;
        height: 80px;
        background: #64D2FF;
        z-index: 4;
        pointer-events: none;
      }

      /* Content area */
      .s02-content {
        position: absolute;
        top: 120px;
        left: 160px;
        right: 160px;
        bottom: 120px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 8px;
        z-index: 5;
      }

      .s02-line1 {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 110px;
        font-weight: 300;
        letter-spacing: -0.03em;
        color: #FFFFFF;
        line-height: 1.05;
        margin: 0;
      }

      .s02-line2 {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 110px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #64D2FF;
        line-height: 1.05;
        margin: 0;
      }

      .s02-line3 {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 72px;
        font-weight: 300;
        letter-spacing: -0.02em;
        color: #FFFFFF;
        line-height: 1.15;
        margin: 0;
        margin-top: 16px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Ghost text entrance + ambient drift
      tl.fromTo(".s02-ghost-text",
        { opacity: 0, x: -40 },
        { opacity: 1, x: 0, duration: 1.2, ease: "power2.out" }, 0.2);

      // Ambient drift on ghost text (attached to timeline, not bare gsap.to)
      tl.to(".s02-ghost-text",
        { x: 30, duration: 12, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3);

      // Corner frame fade in
      tl.fromTo(".s02-corner-frame",
        { opacity: 0 },
        { opacity: 1, duration: 1.0, ease: "power2.out" }, 0.1);

      // Accent bar slides in from left
      tl.fromTo(".s02-accent-bar",
        { scaleY: 0, transformOrigin: "top center" },
        { scaleY: 1, duration: 0.6, ease: "power3.out" }, 0.3);

      // "Redefining" slides in from left
      tl.fromTo(".s02-line1",
        { x: -80, opacity: 0 },
        { x: 0, opacity: 1, duration: 1.0, ease: "power3.out" }, 0.5);

      // "Social Experience" slides in from left (slightly less offset, expo for impact)
      tl.fromTo(".s02-line2",
        { x: -60, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.8, ease: "expo.out" }, 1.2);

      // "with Intelligence" fades up
      tl.fromTo(".s02-line3",
        { y: 40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.7, ease: "power2.out" }, 2.0);

      // Top rule scales in from left
      tl.fromTo(".s02-rule-top",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.6, ease: "power2.inOut" }, 2.5);

      // Bottom rule scales in from left
      tl.fromTo(".s02-rule-bottom",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.6, ease: "power2.inOut" }, 2.7);

      // Dot grid subtle fade in
      tl.fromTo(".s02-dot-grid",
        { opacity: 0 },
        { opacity: 1, duration: 1.5, ease: "power2.out" }, 0);

      // Radial glow subtle pulse
      tl.fromTo(".s02-bg-radial",
        { opacity: 0.5 },
        { opacity: 1, duration: 4, ease: "sine.inOut", yoyo: true, repeat: 3 }, 2);

      window.__timelines["scene-02-vision"] = tl;
    </script>
  </div>
</template>
