<template id="scene-05-template">
  <div data-composition-id="scene-05-dual-platform" data-width="1920" data-height="1080">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

      [data-composition-id="scene-05-dual-platform"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        background: #050505;
        overflow: hidden;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      /* Background layer */
      [data-composition-id="scene-05-dual-platform"] .bg-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: radial-gradient(ellipse at 50% 60%, rgba(100, 210, 255, 0.05) 0%, transparent 55%);
        pointer-events: none;
      }

      [data-composition-id="scene-05-dual-platform"] .bg-noise {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      /* Scene content */
      [data-composition-id="scene-05-dual-platform"] .scene-content {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 80px 100px 60px;
        box-sizing: border-box;
      }

      /* Title */
      [data-composition-id="scene-05-dual-platform"] .scene-title {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 48px;
        font-weight: 300;
        color: #FFFFFF;
        letter-spacing: -0.02em;
        margin-bottom: 48px;
        text-align: center;
      }

      /* Devices container */
      [data-composition-id="scene-05-dual-platform"] .devices-row {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
        gap: 64px;
        width: 100%;
        flex: 1;
      }

      /* Device frame base */
      [data-composition-id="scene-05-dual-platform"] .device-frame {
        width: 42%;
        max-width: 760px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      [data-composition-id="scene-05-dual-platform"] .device-screen-wrapper {
        position: relative;
        width: 100%;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(100, 210, 255, 0.15);
      }

      /* Terminal device */
      [data-composition-id="scene-05-dual-platform"] .terminal-wrapper {
        transform: perspective(1200px) rotateY(-3deg);
        transform-origin: center center;
      }

      [data-composition-id="scene-05-dual-platform"] .terminal-chrome {
        background: #1C1C1E;
        border-radius: 16px 16px 0 0;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      [data-composition-id="scene-05-dual-platform"] .terminal-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      [data-composition-id="scene-05-dual-platform"] .terminal-dot.red { background: #FF5F56; }
      [data-composition-id="scene-05-dual-platform"] .terminal-dot.yellow { background: #FFBD2E; }
      [data-composition-id="scene-05-dual-platform"] .terminal-dot.green { background: #27C93F; }

      [data-composition-id="scene-05-dual-platform"] .terminal-title {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: #86868B;
        margin-left: 12px;
        flex: 1;
        text-align: center;
      }

      [data-composition-id="scene-05-dual-platform"] .terminal-body {
        background: #0D0D0F;
        padding: 20px 24px;
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        line-height: 1.7;
        color: #FFFFFF;
        min-height: 420px;
        overflow: hidden;
      }

      [data-composition-id="scene-05-dual-platform"] .term-cyan { color: #64D2FF; }
      [data-composition-id="scene-05-dual-platform"] .term-green { color: #27C93F; }
      [data-composition-id="scene-05-dual-platform"] .term-yellow { color: #FFBD2E; }
      [data-composition-id="scene-05-dual-platform"] .term-magenta { color: #FF5F99; }
      [data-composition-id="scene-05-dual-platform"] .term-muted { color: #86868B; }
      [data-composition-id="scene-05-dual-platform"] .term-dim { color: #4A4A4C; }

      /* PWA device */
      [data-composition-id="scene-05-dual-platform"] .pwa-wrapper {
        transform: perspective(1200px) rotateY(3deg);
        transform-origin: center center;
      }

      [data-composition-id="scene-05-dual-platform"] .browser-chrome {
        background: #1C1C1E;
        border-radius: 16px 16px 0 0;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      [data-composition-id="scene-05-dual-platform"] .browser-tabs {
        display: flex;
        gap: 8px;
      }

      [data-composition-id="scene-05-dual-platform"] .browser-tab {
        background: rgba(255,255,255,0.06);
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 12px;
        color: #86868B;
      }
      [data-composition-id="scene-05-dual-platform"] .browser-tab.active {
        background: rgba(255,255,255,0.12);
        color: #FFFFFF;
      }

      [data-composition-id="scene-05-dual-platform"] .browser-address {
        flex: 1;
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        color: #86868B;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-body {
        background: #0D0D0F;
        padding: 20px 24px;
        min-height: 420px;
        overflow: hidden;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-card {
        background: rgba(28, 28, 30, 0.8);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #64D2FF, #3B8ED0);
        flex-shrink: 0;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-card-content {
        flex: 1;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-card-author {
        font-size: 15px;
        font-weight: 600;
        color: #FFFFFF;
        margin-bottom: 4px;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-card-handle {
        font-size: 13px;
        color: #86868B;
        margin-bottom: 8px;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-card-text {
        font-size: 14px;
        color: rgba(255,255,255,0.85);
        line-height: 1.5;
      }

      [data-composition-id="scene-05-dual-platform"] .pwa-card-image {
        width: 100%;
        height: 120px;
        background: linear-gradient(135deg, #1C1C1E, #2C2C2E);
        border-radius: 8px;
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4A4A4C;
        font-size: 13px;
      }

      /* Device labels */
      [data-composition-id="scene-05-dual-platform"] .device-label {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 32px;
        font-weight: 600;
        color: #FFFFFF;
        margin-top: 28px;
        text-align: center;
        letter-spacing: -0.01em;
      }

      /* Glow beneath devices */
      [data-composition-id="scene-05-dual-platform"] .device-glow {
        position: absolute;
        bottom: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        height: 60px;
        background: radial-gradient(ellipse at center, rgba(100, 210, 255, 0.15) 0%, transparent 70%);
        pointer-events: none;
        z-index: -1;
      }

      /* Decorative connector line between devices */
      [data-composition-id="scene-05-dual-platform"] .connector-line {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 2px;
        background: linear-gradient(to right, transparent, rgba(100, 210, 255, 0.3), transparent);
        pointer-events: none;
      }
    </style>

    <!-- Background -->
    <div class="bg-glow"></div>
    <div class="bg-noise"></div>

    <!-- Content -->
    <div class="scene-content">
      <div class="scene-title" id="scene-title">Everywhere</div>

      <div class="devices-row">
        <!-- Terminal Device -->
        <div class="device-frame" id="device-left">
          <div class="device-screen-wrapper terminal-wrapper">
            <div class="device-glow"></div>
            <div class="terminal-chrome">
              <div class="terminal-dot red"></div>
              <div class="terminal-dot yellow"></div>
              <div class="terminal-dot green"></div>
              <div class="terminal-title">bsky — terminal</div>
            </div>
            <div class="terminal-body" id="terminal-body">
              <div><span class="term-cyan">$</span> <span class="term-green">bsky</span> feed</div>
              <div class="term-dim">Loading timeline...</div>
              <div>&nbsp;</div>
              <div><span class="term-yellow">@alice.bsky.social</span> <span class="term-muted">2m</span></div>
              <div>Just shipped a new feature! The AI</div>
              <div>integration is getting better every day.</div>
              <div><span class="term-magenta">12 likes</span> <span class="term-muted">3 replies</span></div>
              <div>&nbsp;</div>
              <div><span class="term-yellow">@bob.dev</span> <span class="term-muted">15m</span></div>
              <div>Built with TypeScript, runs everywhere.</div>
              <div>Terminal or browser, your choice.</div>
              <div><span class="term-magenta">28 likes</span> <span class="term-muted">7 replies</span></div>
              <div>&nbsp;</div>
              <div><span class="term-yellow">@charlie.design</span> <span class="term-muted">1h</span></div>
              <div>The new dark mode is chef's kiss.</div>
              <div><span class="term-magenta">45 likes</span> <span class="term-muted">12 replies</span></div>
              <div>&nbsp;</div>
              <div class="term-dim">─ 3 posts ─</div>
            </div>
          </div>
          <div class="device-label" id="label-left">Terminal</div>
        </div>

        <div class="connector-line" id="connector"></div>

        <!-- PWA Device -->
        <div class="device-frame" id="device-right">
          <div class="device-screen-wrapper pwa-wrapper">
            <div class="device-glow"></div>
            <div class="browser-chrome">
              <div class="browser-tabs">
                <div class="browser-tab active">Bluesky</div>
                <div class="browser-tab">+</div>
              </div>
              <div class="browser-address">localhost:5173/#/feed</div>
            </div>
            <div class="pwa-body" id="pwa-body">
              <div class="pwa-card">
                <div class="pwa-avatar"></div>
                <div class="pwa-card-content">
                  <div class="pwa-card-author">Alice</div>
                  <div class="pwa-card-handle">@alice.bsky.social · 2m</div>
                  <div class="pwa-card-text">Just shipped a new feature! The AI integration is getting better every day.</div>
                </div>
              </div>
              <div class="pwa-card">
                <div class="pwa-avatar"></div>
                <div class="pwa-card-content">
                  <div class="pwa-card-author">Bob</div>
                  <div class="pwa-card-handle">@bob.dev · 15m</div>
                  <div class="pwa-card-text">Built with TypeScript, runs everywhere. Terminal or browser, your choice.</div>
                </div>
              </div>
              <div class="pwa-card">
                <div class="pwa-avatar"></div>
                <div class="pwa-card-content">
                  <div class="pwa-card-author">Charlie</div>
                  <div class="pwa-card-handle">@charlie.design · 1h</div>
                  <div class="pwa-card-text">The new dark mode is chef's kiss.</div>
                  <div class="pwa-card-image">image.jpg</div>
                </div>
              </div>
            </div>
          </div>
          <div class="device-label" id="label-right">PWA</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Background entrance
      tl.fromTo(".bg-glow",
        { opacity: 0 },
        { opacity: 1, duration: 1.0, ease: "power2.out" },
        0
      );
      tl.fromTo(".bg-noise",
        { opacity: 0 },
        { opacity: 0.03, duration: 0.8, ease: "power2.out" },
        0.2
      );

      // Title drops in
      tl.fromTo("#scene-title",
        { opacity: 0, y: -60 },
        { opacity: 1, y: 0, duration: 0.8, ease: "bounce.out" },
        0.5
      );

      // Left device slides in from left
      tl.fromTo("#device-left",
        { opacity: 0, x: -200 },
        { opacity: 1, x: 0, duration: 1.0, ease: "power3.out" },
        1.0
      );

      // Right device slides in from right
      tl.fromTo("#device-right",
        { opacity: 0, x: 200 },
        { opacity: 1, x: 0, duration: 1.0, ease: "power3.out" },
        1.3
      );

      // Connector line fades in
      tl.fromTo("#connector",
        { opacity: 0, scaleX: 0 },
        { opacity: 1, scaleX: 1, duration: 0.6, ease: "power2.inOut", transformOrigin: "center center" },
        1.8
      );

      // Device labels fade up
      tl.fromTo("#label-left",
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        1.8
      );
      tl.fromTo("#label-right",
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        2.0
      );

      // Terminal content lines stagger in
      const termLines = document.querySelectorAll("#terminal-body > div");
      tl.fromTo(termLines,
        { opacity: 0, x: -10 },
        { opacity: 1, x: 0, duration: 0.3, ease: "power2.out", stagger: 0.04 },
        1.5
      );

      // PWA cards stagger in
      const pwaCards = document.querySelectorAll(".pwa-card");
      tl.fromTo(pwaCards,
        { opacity: 0, y: 20, scale: 0.97 },
        { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "power3.out", stagger: 0.12 },
        1.6
      );

      // Browser chrome elements
      tl.fromTo(".browser-tab",
        { opacity: 0, y: -8 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out", stagger: 0.05 },
        1.4
      );
      tl.fromTo(".browser-address",
        { opacity: 0 },
        { opacity: 1, duration: 0.4, ease: "power2.out" },
        1.6
      );

      // Terminal chrome dots
      tl.fromTo(".terminal-dot",
        { opacity: 0, scale: 0 },
        { opacity: 1, scale: 1, duration: 0.3, ease: "back.out(2)", stagger: 0.06 },
        1.2
      );

      // Ambient: subtle screen content scroll (Ken Burns feel)
      tl.fromTo("#terminal-body",
        { y: 0 },
        { y: -30, duration: 30, ease: "none" },
        3.0
      );
      tl.fromTo("#pwa-body",
        { y: 0 },
        { y: -25, duration: 30, ease: "none" },
        3.0
      );

      // Ambient: glow pulses
      tl.fromTo(".device-glow",
        { opacity: 0.6 },
        { opacity: 1, duration: 3, ease: "sine.inOut", repeat: 9 },
        4.0
      );

      window.__timelines["scene-05-dual-platform"] = tl;
    </script>
  </div>
</template>
