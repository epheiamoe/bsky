<template id="scene-06-template">
  <div data-composition-id="scene-06-outro" data-width="1920" data-height="1080">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

      [data-composition-id="scene-06-outro"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        background: #050505;
        overflow: hidden;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      /* Background layers */
      [data-composition-id="scene-06-outro"] .bg-radial {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: radial-gradient(ellipse at 50% 45%, rgba(100, 210, 255, 0.07) 0%, transparent 55%);
        pointer-events: none;
      }

      [data-composition-id="scene-06-outro"] .vignette {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(5, 5, 5, 0.6) 100%);
        pointer-events: none;
      }

      /* Three.js canvas */
      [data-composition-id="scene-06-outro"] #three-canvas-06 {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        z-index: 1;
      }

      /* Content layer */
      [data-composition-id="scene-06-outro"] .scene-content {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px;
        box-sizing: border-box;
      }

      [data-composition-id="scene-06-outro"] .logo-area {
        margin-bottom: 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      [data-composition-id="scene-06-outro"] .brand-mark {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(100, 210, 255, 0.2), rgba(100, 210, 255, 0.05));
        border: 1px solid rgba(100, 210, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 40px;
        box-shadow: 0 0 60px rgba(100, 210, 255, 0.15);
      }

      [data-composition-id="scene-06-outro"] .brand-mark svg {
        width: 40px;
        height: 40px;
      }

      [data-composition-id="scene-06-outro"] .main-title {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 72px;
        font-weight: 700;
        color: #FFFFFF;
        letter-spacing: -0.02em;
        text-align: center;
        line-height: 1.1;
        margin-bottom: 20px;
      }

      [data-composition-id="scene-06-outro"] .tagline {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 36px;
        font-weight: 300;
        color: #86868B;
        text-align: center;
        letter-spacing: -0.01em;
        margin-bottom: 60px;
      }

      [data-composition-id="scene-06-outro"] .github-url {
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        font-weight: 400;
        color: #64D2FF;
        text-align: center;
        letter-spacing: 0.02em;
        margin-bottom: 24px;
      }

      [data-composition-id="scene-06-outro"] .features-line {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-size: 20px;
        font-weight: 400;
        color: #86868B;
        text-align: center;
        letter-spacing: 0.03em;
      }

      /* Decorative elements */
      [data-composition-id="scene-06-outro"] .accent-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        border: 1px solid rgba(100, 210, 255, 0.06);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
      }

      [data-composition-id="scene-06-outro"] .accent-ring-2 {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 900px;
        height: 900px;
        border: 1px solid rgba(100, 210, 255, 0.03);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
      }
    </style>

    <!-- Background -->
    <div class="bg-radial"></div>
    <div class="vignette"></div>
    <div class="accent-ring"></div>
    <div class="accent-ring-2"></div>
    <canvas id="three-canvas-06"></canvas>

    <!-- Content -->
    <div class="scene-content">
      <div class="logo-area" id="logo-area">
        <div class="brand-mark" id="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6zm4 4h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#64D2FF" opacity="0.9"/>
            <circle cx="12" cy="12" r="3" stroke="#64D2FF" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
      </div>
      <div class="main-title" id="main-title">AI Bluesky</div>
      <div class="tagline" id="tagline">Where AI Meets Social</div>
      <div class="github-url" id="github-url"></div>
      <div class="features-line" id="features-line">Open Source &middot; AI-Native &middot; Cross-Platform</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.181.2/+esm";

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ===== Three.js: simplified particle sphere =====
      const canvas = document.getElementById("three-canvas-06");
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setSize(1920, 1080, false);
      renderer.setPixelRatio(1);

      const scene3d = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(40, 1920 / 1080, 0.1, 100);
      camera.position.set(0, 0, 8);

      // Seeded random
      function mulberry32(a) {
        return function() {
          a |= 0; a = a + 0x6D2B79F5 | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rand = mulberry32(2024);

      // Particle sphere
      const particleCount = 400;
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);

      const color1 = new THREE.Color(0x64d2ff);
      const color2 = new THREE.Color(0xffffff);

      for (let i = 0; i < particleCount; i++) {
        const theta = rand() * Math.PI * 2;
        const phi = Math.acos(2 * rand() - 1);
        const r = 1.8 + rand() * 0.6;

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);

        const mixFactor = rand();
        const c = color1.clone().lerp(color2, mixFactor);
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;

        sizes[i] = 1.5 + rand() * 2.5;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      geo.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        size: 2.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        sizeAttenuation: true
      });

      const particles = new THREE.Points(geo, mat);
      scene3d.add(particles);

      scene3d.add(new THREE.HemisphereLight(0xffffff, 0x0a1a2a, 1.2));

      function renderThree(time) {
        particles.rotation.y = time * 0.25;
        particles.rotation.x = Math.sin(time * 0.2) * 0.08;
        renderer.render(scene3d, camera);
      }

      window.addEventListener("hf-seek", (event) => {
        renderThree(event.detail.time);
      });
      renderThree(window.__hfThreeTime || 0);

      // ===== GSAP Animations =====

      // Background entrance
      tl.fromTo(".bg-radial",
        { opacity: 0 },
        { opacity: 1, duration: 1.2, ease: "power2.out" },
        0
      );
      tl.fromTo(".vignette",
        { opacity: 0 },
        { opacity: 1, duration: 1.0, ease: "power2.out" },
        0.2
      );
      tl.fromTo("#three-canvas-06",
        { opacity: 0 },
        { opacity: 1, duration: 1.5, ease: "power2.out" },
        0.1
      );
      tl.fromTo(".accent-ring",
        { opacity: 0, scale: 0.8 },
        { opacity: 1, scale: 1, duration: 1.2, ease: "power2.out" },
        0.3
      );
      tl.fromTo(".accent-ring-2",
        { opacity: 0, scale: 0.8 },
        { opacity: 1, scale: 1, duration: 1.4, ease: "power2.out" },
        0.5
      );

      // Logo scales in
      tl.fromTo("#brand-mark",
        { opacity: 0, scale: 0.8 },
        { opacity: 1, scale: 1, duration: 0.6, ease: "power2.out" },
        0.5
      );

      // Title fades up
      tl.fromTo("#main-title",
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" },
        1.0
      );

      // Tagline fades up
      tl.fromTo("#tagline",
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        1.5
      );

      // URL types on character by character
      const urlText = "github.com/epheia/bsky";
      const urlEl = document.getElementById("github-url");
      const charDuration = 0.03;
      urlEl.textContent = "";

      for (let i = 0; i < urlText.length; i++) {
        tl.set(urlEl, {
          textContent: urlText.substring(0, i + 1)
        }, 2.0 + i * charDuration);
      }
      // Fade in the URL container at start of typing
      tl.fromTo("#github-url",
        { opacity: 0 },
        { opacity: 1, duration: 0.1, ease: "none" },
        2.0
      );

      // Features line fades in
      tl.fromTo("#features-line",
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        3.0
      );

      // Ambient: brand mark breathing (scale pulse)
      tl.fromTo("#brand-mark",
        { scale: 1 },
        { scale: 1.04, duration: 3, ease: "sine.inOut", repeat: 3, yoyo: true },
        4.0
      );

      // Ambient: accent rings slow rotation (via CSS var or direct transform)
      // We'll animate opacity for subtle pulsing
      tl.fromTo(".accent-ring",
        { opacity: 0.3 },
        { opacity: 0.6, duration: 4, ease: "sine.inOut", repeat: 2, yoyo: true },
        5.0
      );

      window.__timelines["scene-06-outro"] = tl;
    </script>
  </div>
</template>
