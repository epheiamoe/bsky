    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // --- Entrance animations ---

      // Top label fades in with slight slide
      tl.fromTo(".top-label",
        { y: -20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
        0.2
      );

      // Headline slides in
      tl.fromTo(".headline",
        { y: 40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" },
        0.5
      );

      // Three cards stagger in from bottom
      tl.fromTo(".card",
        { y: 60, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.6, ease: "power3.out", stagger: 0.15 },
        1.2
      );

      // Code lines type on sequentially — card 1
      tl.fromTo(".c1-l1",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        2.2
      );
      tl.fromTo(".c1-l2",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        2.5
      );
      tl.fromTo(".c1-l3",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        2.8
      );

      // Code lines — card 2
      tl.fromTo(".c2-l1",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        3.4
      );
      tl.fromTo(".c2-l2",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        3.7
      );
      tl.fromTo(".c2-l3",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        4.0
      );

      // Code lines — card 3
      tl.fromTo(".c3-l1",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        4.6
      );
      tl.fromTo(".c3-l2",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        4.9
      );
      tl.fromTo(".c3-l3",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
        5.2
      );

      // Cursor blink on last line (finite repeats, no infinite loops)
      // Blink cycle: 0.5s visible, 0.5s hidden = 1s total cycle
      // Cursor active from ~5.5s to end of scene (34s) = ~28.5s = ~28 cycles
      tl.fromTo(".cursor",
        { opacity: 1 },
        { opacity: 0, duration: 0.5, ease: "steps(1)", repeat: 28, yoyo: true },
        5.6
      );

      // Bottom badge scales in
      tl.fromTo(".bottom-badge",
        { scale: 0.8, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.7)" },
        28.0
      );

      window.__timelines["scene-05"] = tl;
    </script>
